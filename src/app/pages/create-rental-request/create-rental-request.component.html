<div class="create-rental-request">
    <h2>Create Rental Request</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="startDate">Start Date:</label>
        <input type="date" id="startDate" [(ngModel)]="rentalRequestData.startDate" name="startDate" class="form-control" required />
      </div>
      <div class="form-group">
        <label for="endDate">End Date:</label>
        <input type="date" id="endDate" [(ngModel)]="rentalRequestData.endDate" name="endDate" class="form-control" required />
      </div>
      <div class="form-group">
        <label for="nGuests">Number of Guests:</label>
        <input type="number" id="nGuests" [(ngModel)]="rentalRequestData.nGuests" name="nGuests" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary">Submit Request</button>
    </form>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </div>
