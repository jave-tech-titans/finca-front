<div class="rating">
    <h2>Rate Property</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="rating">Rating (1-5):</label>
        <input type="number" id="rating" [(ngModel)]="ratingData.rating" name="rating" class="form-control" min="1" max="5" required />
      </div>
      <div class="form-group">
        <label for="comments">Comments:</label>
        <textarea id="comments" [(ngModel)]="ratingData.comments" name="comments" class="form-control" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit Rating</button>
    </form>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </div>
