<div class="payment">
    <h2>Process Payment</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="bank">Bank:</label>
        <input type="text" id="bank" [(ngModel)]="paymentData.bank" name="bank" class="form-control" required />
      </div>
      <div class="form-group">
        <label for="accountNumber">Account Number:</label>
        <input type="number" id="accountNumber" [(ngModel)]="paymentData.accountNumber" name="accountNumber" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary">Submit Payment</button>
    </form>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </div>
